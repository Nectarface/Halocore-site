<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | HALOCORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: #050505; color: #fff; overflow-x: hidden; }
        .font-orbitron { font-family: 'Orbitron', monospace; }
        .cyber-grid { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }
        .scanlines::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.02) 2px, rgba(0, 240, 255, 0.02) 4px); pointer-events: none; z-index: 1000; }
        .neon-cyan { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }
        .neon-pink { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .cyber-panel { background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(0, 240, 255, 0.3); box-shadow: 0 0 20px rgba(0, 240, 255, 0.1); position: relative; }
        .cyber-panel::before { content: ''; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px; border-top: 2px solid #00f0ff; border-left: 2px solid #00f0ff; }
        .cyber-panel::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-bottom: 2px solid #00f0ff; border-right: 2px solid #00f0ff; }
        .cyber-btn { background: linear-gradient(45deg, transparent 5%, rgba(0, 240, 255, 0.1) 5%); border: 1px solid #00f0ff; color: #00f0ff; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); }
        .cyber-btn:hover { background: #00f0ff; color: #000; box-shadow: 0 0 30px #00f0ff; }
        .cyber-btn-pink { background: linear-gradient(45deg, transparent 5%, rgba(255, 0, 255, 0.1) 5%); border-color: #ff00ff; color: #ff00ff; }
        .cyber-btn-pink:hover { background: #ff00ff; color: #000; box-shadow: 0 0 30px #ff00ff; }
        .nav-cyber { background: rgba(5, 5, 5, 0.95); border-bottom: 1px solid rgba(0, 240, 255, 0.3); backdrop-filter: blur(10px); }
        .nav-link-cyber { color: #888; transition: all 0.3s; position: relative; }
        .nav-link-cyber:hover { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }
        .nav-link-cyber::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: #00f0ff; transition: width 0.3s; }
        .nav-link-cyber:hover::after { width: 100%; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .form-input { background: rgba(10, 10, 15, 0.8); border: 1px solid rgba(0, 240, 255, 0.3); color: #fff; transition: all 0.3s; }
        .form-input:focus { outline: none; border-color: #00f0ff; box-shadow: 0 0 20px rgba(0, 240, 255, 0.3); }
        .form-input::placeholder { color: #555; }
    </style>
</head>
<body class="scanlines">
    <div class="cyber-grid"></div>
    
    <nav class="nav-cyber fixed top-0 left-0 right-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="logo.png" alt="HALOCORE" class="w-10 h-10">
                    <span class="font-orbitron text-xl font-bold text-white tracking-widest">HALO<span class="neon-cyan">CORE</span></span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="architecture.html" class="nav-link-cyber font-orbitron text-sm">ARCHITECTURE</a>
                    <a href="services.html" class="nav-link-cyber font-orbitron text-sm">SERVICES</a>
                    <a href="contact.html" class="nav-link-cyber font-orbitron text-sm text-cyber-cyan">CONTACT</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-16 px-6 relative z-10">
        <div class="max-w-7xl mx-auto text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 cyber-panel mb-6">
                <i class="fas fa-envelope text-cyber-cyan"></i>
                <span class="font-orbitron text-xs text-cyber-cyan tracking-widest">CONTACT</span>
            </div>
            <h1 class="font-orbitron text-4xl md:text-5xl lg:text-6xl font-black text-white mb-6">
                GET IN <span class="neon-cyan">TOUCH</span>
            </h1>
        </div>
    </section>

    <!-- Contact Form -->
    <section class="py-16 px-6 relative z-10">
        <div class="max-w-4xl mx-auto">
            <div class="cyber-panel p-8 reveal">
                <form name="contact" method="POST" data-netlify="true" netlify-honeypot="bot-field" action="/contact-success.html">
                    <input type="hidden" name="form-name" value="contact" />
                    <p class="hidden"><label>Don't fill: <input name="bot-field" /></label></p>
                    
                    <div class="grid md:grid-cols-2 gap-6 mb-6">
                        <div>
                            <label class="font-orbitron text-cyber-cyan text-xs mb-2 block">NAME *</label>
                            <input type="text" name="name" required class="form-input w-full px-4 py-3 font-rajdhani" placeholder="Your name">
                        </div>
                        <div>
                            <label class="font-orbitron text-cyber-cyan text-xs mb-2 block">EMAIL *</label>
                            <input type="email" name="email" required class="form-input w-full px-4 py-3 font-rajdhani" placeholder="your@email.com">
                        </div>
                    </div>
                    
                    <div class="mb-6">
                        <label class="font-orbitron text-cyber-cyan text-xs mb-2 block">MESSAGE *</label>
                        <textarea name="message" rows="5" required class="form-input w-full px-4 py-3 font-rajdhani resize-none" placeholder="Your message..."></textarea>
                    </div>
                    
                    <button type="submit" class="cyber-btn w-full py-4 font-orbitron">
                        <i class="fas fa-paper-plane mr-2"></i>TRANSMIT
                    </button>
                </form>
            </div>
        </div>
    </section>

    <footer class="border-t border-cyber-cyan/30 py-12 px-6 relative z-10 bg-cyber-black">
        <div class="max-w-7xl mx-auto text-center">
            <div class="font-orbitron text-xs text-gray-600">© 2026 HALOCORE. ALL SYSTEMS OPERATIONAL.</div>
        </div>
    </footer>

    <script>
        const revealElements = document.querySelectorAll('.reveal');
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        revealElements.forEach(el => revealObserver.observe(el));
    </script>
</body>
</html>
