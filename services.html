<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Services | HALOCORE</title>
    <meta name="description" content="HALOCORE services. AI orchestration, autonomous agents, trading infrastructure, and security tools.">
    <meta name="theme-color" content="#00f0ff">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://halocore.com/services.html">
    <meta property="og:title" content="Services | HALOCORE">
    <meta property="og:description" content="HALOCORE services. AI orchestration, autonomous agents, trading infrastructure, and security tools.">
    <meta property="og:image" content="https://halocore.com/logo.png">
    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Rajdhani', sans-serif; background: #050505; color: #fff; overflow-x: hidden; }
        .font-orbitron { font-family: 'Orbitron', monospace; }
        .font-rajdhani { font-family: 'Rajdhani', sans-serif; }
        .cyber-grid { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px); background-size: 50px 50px; pointer-events: none; z-index: 0; }
        .scanlines::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.02) 2px, rgba(0, 240, 255, 0.02) 4px); pointer-events: none; z-index: 1000; }
        .neon-cyan { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }
        .neon-pink { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; }
        .cyber-panel { background: rgba(10, 10, 15, 0.9); border: 1px solid rgba(0, 240, 255, 0.3); box-shadow: 0 0 20px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05); position: relative; }
        .cyber-panel::before { content: ''; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px; border-top: 2px solid #00f0ff; border-left: 2px solid #00f0ff; }
        .cyber-panel::after { content: ''; position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px; border-bottom: 2px solid #00f0ff; border-right: 2px solid #00f0ff; }
        .cyber-panel-pink { border-color: rgba(255, 0, 255, 0.3); box-shadow: 0 0 20px rgba(255, 0, 255, 0.1), inset 0 0 20px rgba(255, 0, 255, 0.05); }
        .cyber-panel-pink::before { border-top-color: #ff00ff; border-left-color: #ff00ff; }
        .cyber-panel-pink::after { border-bottom-color: #ff00ff; border-right-color: #ff00ff; }
        .cyber-btn { background: linear-gradient(45deg, transparent 5%, rgba(0, 240, 255, 0.1) 5%); border: 1px solid #00f0ff; color: #00f0ff; position: relative; transition: all 0.3s; text-transform: uppercase; letter-spacing: 2px; clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); }
        .cyber-btn:hover { background: #00f0ff; color: #000; box-shadow: 0 0 30px #00f0ff; }
        .cyber-btn-pink { background: linear-gradient(45deg, transparent 5%, rgba(255, 0, 255, 0.1) 5%); border-color: #ff00ff; color: #ff00ff; }
        .cyber-btn-pink:hover { background: #ff00ff; color: #000; box-shadow: 0 0 30px #ff00ff; }
        .nav-cyber { background: rgba(5, 5, 5, 0.95); border-bottom: 1px solid rgba(0, 240, 255, 0.3); backdrop-filter: blur(10px); }
        .nav-link-cyber { color: #888; transition: all 0.3s; position: relative; }
        .nav-link-cyber:hover { color: #00f0ff; text-shadow: 0 0 10px #00f0ff; }
        .nav-link-cyber::after { content: ''; position: absolute; bottom: -5px; left: 0; width: 0; height: 2px; background: #00f0ff; transition: width 0.3s; box-shadow: 0 0 10px #00f0ff; }
        .nav-link-cyber:hover::after { width: 100%; }
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        .service-card { transition: all 0.3s; }
        .service-card:hover { transform: translateY(-5px); box-shadow: 0 10px 40px rgba(0, 240, 255, 0.2); }
    </style>
</head>
<body class="scanlines">
    <!-- Scroll Progress Bar -->
    <div class="progress-bar" id="scrollProgress" style="position: fixed; top: 0; left: 0; height: 3px; background: linear-gradient(90deg, #00f0ff, #ff00ff); box-shadow: 0 0 10px #00f0ff; z-index: 9999; width: 0%; transition: width 0.1s;"></div>
    <div class="cyber-grid"></div>
    
    <nav class="nav-cyber fixed top-0 left-0 right-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <div class="flex items-center justify-between">
                <a href="index.html" class="flex items-center gap-3">
                    <img src="logo.png" alt="HALOCORE" class="w-10 h-10" loading="lazy">
                    <span class="font-orbitron text-xl font-bold text-white tracking-widest">HALO<span class="neon-cyan">CORE</span></span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="architecture.html" class="nav-link-cyber font-orbitron text-sm">ARCHITECTURE</a>
                    <a href="services.html" class="nav-link-cyber font-orbitron text-sm text-cyber-cyan">SERVICES</a>
                    <a href="agents.html" class="nav-link-cyber font-orbitron text-sm">AGENTS</a>
                    <a href="pricing.html" class="nav-link-cyber font-orbitron text-sm">PRICING</a>
                    <a href="contact.html" class="cyber-btn font-orbitron text-sm px-6 py-2">CONTACT</a>
                    <a href="demo.html" class="nav-link-cyber font-orbitron text-sm">DEMO</a>
                    <a href="comparison.html" class="nav-link-cyber font-orbitron text-sm">COMPARE</a>
                </div>
            </div>
        </div>
    </nav>

    <section class="pt-32 pb-16 px-6 relative z-10">
        <div class="max-w-7xl mx-auto text-center">
            <div class="inline-flex items-center gap-2 px-4 py-2 cyber-panel mb-6">
                <i class="fas fa-cogs text-cyber-cyan"></i>
                <span class="font-orbitron text-xs text-cyber-cyan tracking-widest">SERVICE MATRIX</span>
            </div>
            <h1 class="font-orbitron text-4xl md:text-5xl lg:text-6xl font-black text-white mb-6">
                AUTONOMOUS <span class="neon-cyan">SYSTEMS</span>
            </h1>
            <p class="font-rajdhani text-lg text-gray-400 max-w-3xl mx-auto">
                Deploy intelligent agent swarms. From trading to security—24/7 autonomous operation.
            </p>
        </div>
    </section>

    <!-- Search Bar -->
    <section class="py-6 px-6 relative z-10">
        <div class="max-w-7xl mx-auto">
            <div class="service-search-container max-w-2xl mx-auto reveal">
                <div class="relative">
                    <i class="fas fa-search absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-500"></i>
                    <input type="text" id="serviceSearch" placeholder="Search services..." class="w-full pl-12 pr-4 py-3 bg-black/50 border border-cyber-cyan/30 text-white font-rajdhani focus:outline-none focus:border-cyber-cyan focus:shadow-[0_0_15px_rgba(0,240,255,0.2)] transition-all duration-300">
                </div>
            </div>
        </div>
    </section>

    <!-- Services Grid -->
    <section class="py-16 px-6 relative z-10">
        <div class="max-w-7xl mx-auto">
            <div id="servicesGrid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Services will be rendered by JavaScript -->
            </div>
            
            <!-- No Results Message -->
            <div id="noResults" class="hidden text-center py-12">
                <i class="fas fa-search text-4xl text-gray-600 mb-4"></i>
                <p class="font-orbitron text-xl text-gray-400">No services found</p>
                <p class="font-rajdhani text-gray-500 mt-2">Try a different search term</p>
            </div>
        </div>
    </section>

    <footer class="border-t border-cyber-cyan/30 py-12 px-6 relative z-10 bg-cyber-black">
        <div class="max-w-7xl mx-auto text-center">
            <div class="font-orbitron text-xs text-gray-600">© 2026 HALOCORE. ALL SYSTEMS OPERATIONAL.</div>
        </div>
    </footer>

    <script>
        // Service data array for search functionality
        const services = [
            { 
                id: 'autonomous-coding', 
                name: 'AUTONOMOUS CODING', 
                category: 'core', 
                icon: 'fa-code', 
                color: 'cyan', 
                description: 'AI agents that write, review, and optimize code. Multi-language support.',
                tags: ['ACTIVE'],
                section: 'Core Services'
            },
            { 
                id: 'data-intelligence', 
                name: 'DATA INTELLIGENCE', 
                category: 'core', 
                icon: 'fa-chart-line', 
                color: 'pink', 
                description: 'Pattern recognition. Predictive analytics. Automated reporting.',
                tags: ['ANALYSIS'],
                section: 'Core Services'
            },
            { 
                id: 'content-synthesis', 
                name: 'CONTENT SYNTHESIS', 
                category: 'core', 
                icon: 'fa-pen-nib', 
                color: 'cyan', 
                description: 'Generate documentation and creative content at scale.',
                tags: ['GENERATE'],
                section: 'Core Services'
            },
            { 
                id: 'qamas-execution', 
                name: 'EXECUTION', 
                category: 'trading', 
                icon: 'fa-exchange-alt', 
                color: 'cyan', 
                description: 'Buy/sell signals with intelligent position sizing.',
                tags: ['LAYER 1'],
                section: 'QAMAS Platform'
            },
            { 
                id: 'qamas-strategy', 
                name: 'STRATEGY', 
                category: 'trading', 
                icon: 'fa-brain', 
                color: 'pink', 
                description: 'Technical indicators and AI predictions.',
                tags: ['LAYER 2'],
                section: 'QAMAS Platform'
            },
            { 
                id: 'qamas-risk', 
                name: 'RISK', 
                category: 'trading', 
                icon: 'fa-shield-alt', 
                color: 'cyan', 
                description: 'Position limits and circuit breakers.',
                tags: ['LAYER 3'],
                section: 'QAMAS Platform'
            },
            { 
                id: 'qamas-intelligence', 
                name: 'INTELLIGENCE', 
                category: 'trading', 
                icon: 'fa-memory', 
                color: 'pink', 
                description: 'Market analysis and memory learning.',
                tags: ['LAYER 4'],
                section: 'QAMAS Platform'
            },
            { 
                id: 'erebus-prime', 
                name: 'EREBUS PRIME', 
                category: 'security', 
                icon: 'fa-bug', 
                color: 'pink', 
                description: 'Automated bounty hunting with integrated scanners and case management.',
                tags: ['HACKERONE', 'BUGCROWD', 'XSSTRIKE'],
                section: 'Security'
            },
            { 
                id: 'osint-suite', 
                name: 'OSINT SUITE', 
                category: 'security', 
                icon: 'fa-search', 
                color: 'cyan', 
                description: '100+ specialized analyzers for intelligence gathering and threat analysis.',
                tags: ['EMAIL', 'DNS', 'BLOCKCHAIN'],
                section: 'Security'
            }
        ];

        // Search functionality
        const searchInput = document.getElementById('serviceSearch');
        const servicesGrid = document.getElementById('servicesGrid');
        const noResults = document.getElementById('noResults');

        // Render services function
        function renderServices(servicesToRender) {
            if (servicesToRender.length === 0) {
                servicesGrid.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            
            noResults.classList.add('hidden');
            servicesGrid.innerHTML = servicesToRender.map(service => {
                const isPink = service.color === 'pink';
                const borderColor = isPink ? 'border-cyber-pink/50' : 'border-cyber-cyan/50';
                const bgColor = isPink ? 'bg-cyber-pink/10' : 'bg-cyber-cyan/10';
                const textColor = isPink ? 'text-cyber-pink' : 'text-cyber-cyan';
                const pinkClass = isPink ? 'cyber-panel-pink' : '';
                const pinkHoverClass = isPink ? 'pink' : '';
                
                const tagsHtml = service.tags.map(tag => {
                    const tagBorder = isPink ? 'border-cyber-pink/30 text-cyber-pink' : 'border-cyber-cyan/30 text-cyber-cyan';
                    return `<span class="px-2 py-1 border ${tagBorder} text-xs font-orbitron">${tag}</span>`;
                }).join('');
                
                return `
                    <div class="cyber-panel ${pinkClass} service-card p-6 reveal ${pinkHoverClass}" data-category="${service.category}">
                        <div class="w-14 h-14 flex items-center justify-center border ${borderColor} ${bgColor} mb-4">
                            <i class="fas ${service.icon} text-2xl ${textColor}"></i>
                        </div>
                        <div class="font-orbitron text-cyber-cyan/60 text-xs mb-2">${service.section}</div>
                        <h3 class="font-orbitron text-lg text-white mb-2">${service.name}</h3>
                        <p class="font-rajdhani text-gray-400 text-sm mb-4">${service.description}</p>
                        <div class="flex flex-wrap gap-2">
                            ${tagsHtml}
                        </div>
                    </div>
                `;
            }).join('');
            
            // Re-initialize reveal animation for new elements
            const newRevealElements = servicesGrid.querySelectorAll('.reveal');
            newRevealElements.forEach(el => {
                el.classList.add('active');
            });
        }

        // Initial render
        renderServices(services);

        function filterServices() {
            const searchTerm = searchInput.value.toLowerCase();
            
            const filtered = services.filter(service => {
                return service.name.toLowerCase().includes(searchTerm) || 
                       service.description.toLowerCase().includes(searchTerm) ||
                       service.category.toLowerCase().includes(searchTerm) ||
                       service.section.toLowerCase().includes(searchTerm) ||
                       service.tags.some(tag => tag.toLowerCase().includes(searchTerm));
            });
            
            renderServices(filtered);
        }

        searchInput.addEventListener('input', filterServices);

        // Scroll reveal
        const revealElements = document.querySelectorAll('.reveal');
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        revealElements.forEach(el => revealObserver.observe(el));

        // Scroll Progress Bar
        window.addEventListener('scroll', () => {
            const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
            const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            const scrolled = (scrollTop / scrollHeight) * 100;
            document.getElementById('scrollProgress').style.width = scrolled + '%';
        });
        
        // Console Easter Egg
        console.log('%c⚠️ HALOCORE SERVICES ⚠️', 'color: #00f0ff; font-size: 20px; font-weight: bold;');
        console.log('%c> Service catalog loaded', 'color: #ff00ff;');
        console.log('%c> Search functionality active', 'color: #00f0ff;');
    </script>
<script src="chat-widget.js"></script>
</body>
</html>
